<!DOCTYPE html>
<html>
<head>
  <title>Dino Pro Game</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas {
      background: #f7f7f7;
      display: block;
      margin: auto;
    }
  </style>
</head>
<body>

<canvas id="game" width="800" height="250"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let dino = { x: 50, y: 200, w: 30, h: 30, vy: 0, jumping: false };
let gravity = 0.8;
let obstacles = [];
let speed = 5;
let score = 0;
let gameRunning = true;

// Better font
ctx.font = "20px Arial";

// Jump
function jump() {
  if (!dino.jumping && gameRunning) {
    dino.vy = -12;
    dino.jumping = true;
  }
}

document.addEventListener("keydown", jump);
document.addEventListener("touchstart", jump);

// Random obstacle spawn
function spawnObstacle() {
  if (!gameRunning) return;

  obstacles.push({
    x: canvas.width,
    y: 210,
    w: 20,
    h: 40
  });

  // Random delay
  let nextTime = Math.random() * 1500 + 800;
  setTimeout(spawnObstacle, nextTime);
}

// Collision
function isColliding(a, b) {
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

// Game Over
function gameOver() {
  gameRunning = false;

  // Telegram safe check
  if (window.TelegramGameProxy && TelegramGameProxy.postScore) {
    TelegramGameProxy.postScore(score);
  }

  setTimeout(() => {
    alert("Game Over! Score: " + score);
    location.reload();
  }, 100);
}

// Game Loop
function update() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Dino physics
  dino.vy += gravity;
  dino.y += dino.vy;

  if (dino.y >= 200) {
    dino.y = 200;
    dino.jumping = false;
  }

  ctx.fillRect(dino.x, dino.y, dino.w, dino.h);

  // Obstacles
  for (let obs of obstacles) {
    obs.x -= speed;
    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

    if (isColliding(dino, obs)) {
      gameOver();
    }
  }

  obstacles = obstacles.filter(o => o.x > -50);

  // Score
  score++;
  ctx.fillText("Score: " + score, 650, 30);

  requestAnimationFrame(update);
}

// Speed increase
setInterval(() => {
  if (gameRunning) speed += 0.3;
}, 3000);

// Start
spawnObstacle();
update();
</script>

</body>
</html>
</body>
</html>
