<!DOCTYPE html>
<html>
<head>
  <title>Dino Test</title>
</head>
<body>

<h2>Dino Game Test</h2>
<canvas id="game" width="600" height="200" style="border:1px solid black;"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let x = 50;
let y = 150;
let vy = 0;
let jumping = false;

document.addEventListener("click", () => {
  if (!jumping) {
    vy = -10;
    jumping = true;
  }
});

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  vy += 0.5;
  y += vy;

  if (y >= 150) {
    y = 150;
    jumping = false;
  }

  ctx.fillRect(x, y, 20, 20);

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
